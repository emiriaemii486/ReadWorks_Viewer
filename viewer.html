<!-- sitemap: false -->
<!doctype html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Viewer</title>
</head>

<body>

<div id="header">
  <div id="back">
    <a href="javascript:history.back()">戻る</a>
  </div>
  <h1 id="title"></h1>
</div>

<div id="wrap">
  <div id="quote"></div>
  <div id="viewer"></div>
</div>

<script>
window.addEventListener("DOMContentLoaded", () => {

  const viewer = document.getElementById("viewer");
  const titleEl = document.getElementById("title");
  const quoteEl = document.getElementById("quote");

  const params = new URLSearchParams(location.search);
  const book = params.get("book");
  const id = params.get("id");

  if (!book || !id) {
    titleEl.textContent = "URLが不正です";
    return;
  }

  const file =
    `${book}/text/${encodeURIComponent(id)}.txt`;

fetch(file)
  .then(r => r.text())
  .then(text => {

    const lines =
      text.replace(/\r/g, "").split("\n");

    titleEl.textContent = lines[0] || "";

    let quoteLines = [];
    let bodyLines = [];

    let inQuote = false;

    for (let i = 1; i < lines.length; i++) {

      const line = lines[i];

      if (line === "『") {
        inQuote = true;
        continue;
      }

      if (line === "』") {
        inQuote = false;
        continue;
      }

      if (inQuote) {
        quoteLines.push(line);
      } else {
        bodyLines.push(line);
      }
    }

    quoteEl.textContent =
      quoteLines.join("\n");

    viewer.textContent =
      bodyLines.join("\n");
  });
});
</script>

</body>
</html>
