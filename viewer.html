<!doctype html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Viewer</title>
</head>

<body>
<div id="wrap">
  <div id="back">
    <a href="javascript:history.back()">戻る</a>
  </div>
  <h1 id="title"></h1>

  <div id="viewer"></div>
</div>

<script>
window.addEventListener("DOMContentLoaded", () => {
  
  const viewer = document.getElementById("viewer");
  const titleEl = document.getElementById("title");
  const params = new URLSearchParams(location.search);  
  const book = params.get("book");
  const id = params.get("id");
  const file = `${book}/text/${encodeURIComponent(id)}.txt`;
  const saveKey = "viewer_" + id;
  
  let lines = [];
  let index = -1;
  
  if (!book || !id) {
    document.getElementById("title").textContent = "URLが不正です";
    throw new Error("invalid url");
  }
  
  fetch(file)
    .then(r => r.text())
    .then(text => {
      lines = text.replace(/\r/g, "").split("\n");
      titleEl.textContent = lines[0] || "";
      lines = lines.slice(1);

      const saved = localStorage.getItem(saveKey);

      if (saved !== null) {
        index = parseInt(saved, 10);
      } else {
        index = -1;
      }

      render();
    });
      
  function render() {

    viewer.innerHTML = "";

    if (index < 0) {
      localStorage.setItem(saveKey, index);
      return;
    }

    for (let i = 0; i <= index; i++) {
      const div = document.createElement("div");
      div.textContent = lines[i] === "" ? " " : lines[i];
      viewer.appendChild(div);
    }

    localStorage.setItem(saveKey, index);
  }

  window.addEventListener("keydown", (e) => {
    if (e.key === "ArrowDown") index++;
    if (e.key === "ArrowUp") index--;
    
    if (index < -1) index = -1;
    if (index >= lines.length - 1) index = lines.length - 1;
    
    if (lines[lines.length - 1] === "") {
      lines.pop();
    }

    render();
  });

  document.addEventListener("click", (e) => {
  if (e.clientX > window.innerWidth / 2) {
    index++;
  } else {
    index--;
  }

  if (index < -1) index = -1;
  if (index > lines.length - 1) index = lines.length - 1;

  render();
  });
});
</script>
</body>
